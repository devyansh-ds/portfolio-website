<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Page Not Found</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:     #0d0d0d;
      --text:   #e8e4dc;
      --muted:  #7a7068;
      --accent: #c8a96e;
      --mono:   'DM Mono', monospace;
      --serif:  'DM Serif Display', Georgia, serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .container {
      max-width: 480px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.8s cubic-bezier(0.16,1,0.3,1) 0.1s forwards;
    }

    .code {
      font-family: var(--serif);
      font-size: clamp(6rem, 20vw, 10rem);
      line-height: 1;
      color: var(--accent);
      margin-bottom: 1rem;
      font-style: italic;
    }

    h1 {
      font-family: var(--serif);
      font-size: 1.6rem;
      margin-bottom: 0.75rem;
      font-weight: 400;
    }

    p {
      color: var(--muted);
      font-size: 0.85rem;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .btn {
      display: inline-block;
      padding: 0.65rem 1.6rem;
      font-family: var(--mono);
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      border: 1px solid var(--accent);
      color: var(--accent);
      background: transparent;
      transition: background 0.25s, color 0.25s;
    }
    .btn:hover { background: var(--accent); color: var(--bg); }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--accent);
      margin: 1.5rem auto;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <div class="divider"></div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or has been moved.<br/>Let's get you back on track.</p>
    <a href="/index.html" class="btn">← Back to Home</a>
  </div>
</body>
</html>
